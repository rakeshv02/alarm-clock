<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Online Alarm Clock — Tabutility</title>
<meta name="description" content="Free online alarm clock. Set an alarm time and get an audio alert — no app needed, runs in your browser."/>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-78VZWJ5B1W"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-78VZWJ5B1W');</script>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#f1f5f9;min-height:100vh}nav{background:#1e293b;border-bottom:1px solid #334155;padding:14px 24px;display:flex;align-items:center;gap:16px}nav a{color:#94a3b8;text-decoration:none;font-size:14px}nav a:hover{color:#f1f5f9}nav .brand{color:#38bdf8;font-weight:700;font-size:18px}.ad-banner{background:#1e293b;border-bottom:1px solid #334155;padding:8px;text-align:center}</style>
</head>
<body>
<nav><span class="brand">⚡ Tabutility</span><a href="https://tabutility.com">← All Tools</a></nav>
<div class="ad-banner"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-7039091592734005" data-ad-slot="auto" data-ad-format="auto" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div>
<div id="root"></div>
<script type="text/babel">
//<![CDATA[
const { useState, useEffect, useRef } = React;

function pad(n) { return String(n).padStart(2,'0'); }

function playAlarmSound(ctx) {
  let t = ctx.currentTime;
  for (let i = 0; i < 8; i++) {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = i % 2 === 0 ? 880 : 1100;
    g.gain.setValueAtTime(0.5, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    o.start(t); o.stop(t + 0.25);
    t += 0.3;
  }
}

export default function AlarmClock() {
  const [now, setNow] = useState(new Date());
  const [alarmTime, setAlarmTime] = useState('');
  const [alarmSet, setAlarmSet] = useState(false);
  const [ringing, setRinging] = useState(false);
  const [alarms, setAlarms] = useState([]);
  const [label, setLabel] = useState('');
  const audioRef = useRef(null);
  const ringInterval = useRef(null);

  const getCtx = () => { if (!audioRef.current) audioRef.current = new AudioContext(); return audioRef.current; };

  useEffect(() => {
    const tick = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(tick);
  }, []);

  useEffect(() => {
    if (alarms.length === 0) return;
    const check = setInterval(() => {
      const n = new Date();
      const timeStr = `${pad(n.getHours())}:${pad(n.getMinutes())}`;
      const secs = n.getSeconds();
      if (secs === 0) {
        const triggered = alarms.find(a => a.active && a.time === timeStr);
        if (triggered) {
          setRinging(true);
          try { playAlarmSound(getCtx()); } catch(e) {}
          ringInterval.current = setInterval(() => {
            try { playAlarmSound(getCtx()); } catch(e) {}
          }, 2600);
          setAlarms(prev => prev.map(a => a.id === triggered.id ? {...a, active: false} : a));
        }
      }
    }, 1000);
    return () => clearInterval(check);
  }, [alarms]);

  const dismiss = () => {
    setRinging(false);
    clearInterval(ringInterval.current);
  };

  const addAlarm = () => {
    if (!alarmTime) return;
    setAlarms(prev => [...prev, { id: Date.now(), time: alarmTime, label: label || 'Alarm', active: true }]);
    setAlarmTime(''); setLabel('');
  };

  const removeAlarm = (id) => setAlarms(prev => prev.filter(a => a.id !== id));
  const toggleAlarm = (id) => setAlarms(prev => prev.map(a => a.id === id ? {...a, active: !a.active} : a));

  const h = now.getHours(); const m = now.getMinutes(); const s = now.getSeconds();
  const deg = (h % 12) * 30 + m * 0.5;
  const mdeg = m * 6 + s * 0.1;
  const sdeg = s * 6;

  return (
    <div style={{maxWidth:520,margin:'40px auto',padding:'0 20px'}}>
      <h1 style={{textAlign:'center',fontSize:28,fontWeight:700,marginBottom:8}}>Online Alarm Clock</h1>
      <p style={{textAlign:'center',color:'#94a3b8',marginBottom:32}}>Set alarms in your browser — no app, no install</p>

      {ringing && (
        <div style={{background:'#ef4444',borderRadius:16,padding:20,textAlign:'center',marginBottom:24,animation:'pulse 0.5s infinite alternate'}}>
          <div style={{fontSize:32,marginBottom:8}}>🔔</div>
          <div style={{fontSize:20,fontWeight:700,marginBottom:12}}>ALARM!</div>
          <button onClick={dismiss} style={{background:'#fff',color:'#ef4444',border:'none',borderRadius:10,padding:'10px 28px',fontSize:16,fontWeight:700,cursor:'pointer'}}>Dismiss</button>
        </div>
      )}

      <div style={{background:'#1e293b',borderRadius:20,padding:'32px 24px',textAlign:'center',border:'1px solid #334155',marginBottom:24}}>
        <svg width="220" height="220" style={{display:'block',margin:'0 auto 20px'}}>
          <circle cx="110" cy="110" r="100" fill="#0f172a" stroke="#334155" strokeWidth="2"/>
          {[...Array(12)].map((_,i) => {
            const a = (i * 30 - 90) * Math.PI / 180;
            return <line key={i} x1={110+85*Math.cos(a)} y1={110+85*Math.sin(a)} x2={110+95*Math.cos(a)} y2={110+95*Math.sin(a)} stroke="#475569" strokeWidth="2"/>;
          })}
          {/* Hour hand */}
          <line x1="110" y1="110" x2={110+55*Math.cos((deg-90)*Math.PI/180)} y2={110+55*Math.sin((deg-90)*Math.PI/180)} stroke="#f1f5f9" strokeWidth="5" strokeLinecap="round"/>
          {/* Minute hand */}
          <line x1="110" y1="110" x2={110+75*Math.cos((mdeg-90)*Math.PI/180)} y2={110+75*Math.sin((mdeg-90)*Math.PI/180)} stroke="#f1f5f9" strokeWidth="3" strokeLinecap="round"/>
          {/* Second hand */}
          <line x1="110" y1="110" x2={110+80*Math.cos((sdeg-90)*Math.PI/180)} y2={110+80*Math.sin((sdeg-90)*Math.PI/180)} stroke="#38bdf8" strokeWidth="1.5" strokeLinecap="round"/>
          <circle cx="110" cy="110" r="4" fill="#38bdf8"/>
        </svg>
        <div style={{fontFamily:'monospace',fontSize:48,fontWeight:300,letterSpacing:2,color:'#f1f5f9'}}>
          {pad(h)}:{pad(m)}:{pad(s)}
        </div>
        <div style={{color:'#64748b',fontSize:14,marginTop:4}}>
          {now.toLocaleDateString('en-GB', {weekday:'long',year:'numeric',month:'long',day:'numeric'})}
        </div>
      </div>

      <div style={{background:'#1e293b',borderRadius:16,padding:20,border:'1px solid #334155',marginBottom:16}}>
        <h2 style={{fontSize:16,fontWeight:600,marginBottom:16}}>Set Alarm</h2>
        <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
          <input type="time" value={alarmTime} onChange={e => setAlarmTime(e.target.value)}
            style={{flex:1,minWidth:120,background:'#0f172a',color:'#f1f5f9',border:'1px solid #334155',borderRadius:8,padding:'10px',fontSize:18}}/>
          <input placeholder="Label (optional)" value={label} onChange={e=>setLabel(e.target.value)}
            style={{flex:2,minWidth:140,background:'#0f172a',color:'#f1f5f9',border:'1px solid #334155',borderRadius:8,padding:'10px',fontSize:14}}/>
          <button onClick={addAlarm} style={{background:'#38bdf8',color:'#0f172a',border:'none',borderRadius:8,padding:'10px 20px',fontSize:15,fontWeight:700,cursor:'pointer'}}>Add Alarm</button>
        </div>
      </div>

      {alarms.length > 0 && (
        <div style={{background:'#1e293b',borderRadius:16,border:'1px solid #334155',overflow:'hidden'}}>
          <div style={{padding:'14px 20px',borderBottom:'1px solid #334155',fontSize:13,color:'#64748b',fontWeight:600}}>ALARMS</div>
          {alarms.map(a => (
            <div key={a.id} style={{padding:'14px 20px',borderBottom:'1px solid #1e293b',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <div style={{fontFamily:'monospace',fontSize:24,fontWeight:300,color:a.active?'#f1f5f9':'#475569'}}>{a.time}</div>
                <div style={{fontSize:13,color:'#64748b'}}>{a.label}</div>
              </div>
              <div style={{display:'flex',gap:10,alignItems:'center'}}>
                <label style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer'}}>
                  <div onClick={() => toggleAlarm(a.id)} style={{width:44,height:24,background:a.active?'#38bdf8':'#334155',borderRadius:12,position:'relative',transition:'background 0.2s',cursor:'pointer'}}>
                    <div style={{width:18,height:18,background:'#fff',borderRadius:9,position:'absolute',top:3,left:a.active?23:3,transition:'left 0.2s'}}/>
                  </div>
                </label>
                <button onClick={() => removeAlarm(a.id)} style={{background:'none',border:'none',color:'#ef4444',fontSize:18,cursor:'pointer'}}>✕</button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<AlarmClock />);
//]]>
</script>
</body>
</html>
